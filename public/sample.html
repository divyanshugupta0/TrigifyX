<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sample Site — TrigifyX Test</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <main class="wrap">
    <div class="card" style="max-width:520px;margin:40px auto 0;">
      <div class="brand" style="margin-bottom:10px;">
        <div class="logo">S</div>
        <div>Sample Site<small>TrigifyX capture test</small></div>
      </div>
      <p class="lead">This is a dummy website with a contact form. Submit it and the data is
        captured by the TrigifyX script and forwarded to the linked Telegram account.</p>

      <form id="contact-form" class="mt">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" placeholder="Jane Doe" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@site.com" required />

        <label for="phone">Phone</label>
        <input id="phone" name="phone" type="tel" placeholder="+1 555 000 0000" />

        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="How can we help?" required></textarea>

        <label class="row" style="gap:8px;font-weight:400;color:var(--muted);">
          <input type="checkbox" name="newsletter" value="yes" style="width:auto;" /> Subscribe to newsletter
        </label>

        <button class="btn block mt" type="submit">Send message</button>
      </form>

      <p id="result" class="muted center mt"></p>
    </div>
  </main>

  <!-- TrigifyX: paste before </body> on every page with a form -->
<!-- Also upload js/trigifyx-capture.js to your site (same folder as this page) -->
<script>
  window.TRIGIFYX = {
    accessToken: "52a1e1ad87a8e92ced665d6810f2b0c7720fb3fe4a878fbd3c555871843c7877244fca73",
    endpoint: "https://trigifyx-worker.divyanshugupta415.workers.dev",
  };
</script>
<script src="https://trigifyx-worker.divyanshugupta415.workers.dev/trigifyx-capture.js" defer></script>
  <script>
    // Just show a friendly message on submit (native submission still proceeds).
    document.getElementById("contact-form").addEventListener("submit", function () {
      var r = document.getElementById("result");
      r.textContent = "Submitting… your details are being sent to TrigifyXbot.";
      setTimeout(function () { r.textContent = ""; }, 4000);
    });
  </script>
</body>
</html>
